name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format check
        run: ruff format --check src tests

      - name: Type check
        run: mypy src/pseudokrat

      - name: Run tests
        env:
          PSEUDOKRAT_DISABLE_ML: "1"
        run: pytest --cov --cov-report=xml --cov-report=term-missing -m "not ml and not slow"

      - name: Coverage threshold
        run: python -c "import xml.etree.ElementTree as ET; r=ET.parse('coverage.xml').getroot(); rate=float(r.get('line-rate')); print(f'coverage={rate:.3f}'); exit(0 if rate >= 0.80 else 1)"

  security:
    name: Security scans (bandit + pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install scanners
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
          pip install -e .

      - name: Bandit (source code static analysis)
        run: bandit -r src/pseudokrat -c pyproject.toml --severity-level medium

      - name: pip-audit (Dependency CVE check)
        run: pip-audit --desc
